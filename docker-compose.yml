name: openhands-gitlab

services:
  # ─── GitLab CE ───────────────────────────────────────────────────────────────
  # profiles: [local] を指定しているため、通常の docker compose up では起動しない。
  # ローカル GitLab を使う場合:
  #   docker compose --profile local up -d
  # 外部 GitLab を使う場合:
  #   docker compose up -d  （gitlab サービスはスキップされる）
  gitlab:
    profiles: [local]
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: unless-stopped
    hostname: gitlab
    environment:
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD}
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost'
        gitlab_rails['initial_root_password'] = ENV['GITLAB_ROOT_PASSWORD']
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-2222}
        prometheus_monitoring['enable'] = false
        alertmanager['enable'] = false
        gitlab_exporter['enable'] = false
        node_exporter['enable'] = false
    ports:
      - "${GITLAB_HTTP_PORT:-8080}:80"
      - "${GITLAB_SSH_PORT:-2222}:22"
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    networks:
      - openhands-net
    shm_size: 256m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s

  # ─── GitLab SSL プロキシ ───────────────────────────────────────────────────────
  # HTTP GitLab 用の HTTPS→HTTP リバースプロキシ。
  # OpenHands Resolver は GitLab API を常に HTTPS で呼ぶため、
  # このプロキシ経由で HTTP GitLab に接続する。
  #
  # ローカル GitLab: GITLAB_UPSTREAM_URL=http://gitlab:80
  # 外部 HTTP GitLab: GITLAB_UPSTREAM_URL=http://<GitLabホスト>:<ポート>
  #
  # 自己署名証明書を /tmp/openhands-gitlab-ssl/ に生成してホストと共有する。
  # GITLAB_SSL_CERT が設定されている場合のみ実質的に使用される。
  gitlab-ssl-proxy:
    build:
      context: ./nginx
    container_name: gitlab-ssl-proxy
    restart: unless-stopped
    environment:
      - GITLAB_UPSTREAM_URL=${GITLAB_UPSTREAM_URL:-http://gitlab:80}
    volumes:
      - /tmp/openhands-gitlab-ssl:/tmp/openhands-gitlab-ssl
    networks:
      - openhands-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── OpenHands UI ─────────────────────────────────────────────────────────────
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.5
    container_name: openhands
    restart: unless-stopped
    ports:
      - "${OPENHANDS_PORT:-3000}:3000"
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=ghcr.io/openhands/agent-server
      - AGENT_SERVER_IMAGE_TAG=1.12.0-python
      - WORKSPACE_MOUNT_PATH=/opt/workspace_base
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-4.1}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-config:/.openhands
      - openhands-workspace:/opt/workspace_base
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openhands-net
    stdin_open: true
    tty: true

  # ─── OpenHands Resolver イメージビルダー ────────────────────────────────────────
  # git を含む resolver 専用イメージをビルドするためのサービス。
  # 実際にはコンテナとして起動せず、イメージのビルドにのみ使用する。
  # openhands-webhook が docker run でこのイメージを使って resolver を起動する。
  openhands-resolver-image:
    build:
      context: ./resolver
    image: openhands-resolver:local
    profiles: [build-only]    # 通常の up では起動しない
    command: echo "resolver image built"

  # ─── Webhook Receiver (GitLab → OpenHands Resolver トリガー) ──────────────────
  openhands-webhook:
    build:
      context: ./webhook
    container_name: openhands-webhook
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    environment:
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - GITLAB_USERNAME=${OPENHANDS_USER:-openhands}
      # GITLAB_BASE_URL:
      #   ローカルモード → http://{DOCKER_HOST_INTERNAL}:{GITLAB_HTTP_PORT}
      #   外部モード     → GITLAB_EXTERNAL_URL をそのまま使う（setup.sh が設定）
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-http://${DOCKER_HOST_INTERNAL:-host.docker.internal}:${GITLAB_HTTP_PORT:-8080}}
      - GIT_BASE_DOMAIN=${GIT_BASE_DOMAIN:-${DOCKER_HOST_INTERNAL:-host.docker.internal}:${GITLAB_HTTP_PORT:-8080}}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-4.1}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - TRIGGER_LABEL=${TRIGGER_LABEL:-openhands}
      - TRIGGER_MENTION=${TRIGGER_MENTION:-@openhands}
      - RESOLVER_NETWORK=openhands-net
      - OPENHANDS_IMAGE=openhands-resolver:local
      - AGENT_SERVER_IMAGE_TAG=1.12.0-python
      - RESOLVER_WORKSPACE_HOST_PATH=/tmp/openhands-resolver-workspace
      # ローカル GitLab (HTTP) 用の自己署名証明書パス（setup.sh が自動設定）
      # 外部 GitLab (HTTPS) の場合は空のまま
      - GITLAB_SSL_CERT=${GITLAB_SSL_CERT:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/openhands-resolver-workspace:/tmp/openhands-resolver-workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - openhands-net

networks:
  openhands-net:
    name: openhands-net
    driver: bridge

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  openhands-config:
  openhands-workspace:
